services:
  app:
    image: {{IMAGE}}
    container_name: mycalculator-{{TENANT_ID}}
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - calculator-network

  web:
    image: nginx:alpine
    container_name: mycalculator-web-{{TENANT_ID}}
    restart: unless-stopped
    ports:
      - "{{APP_PORT}}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - calculator-network

networks:
  calculator-network:
    driver: bridge
